<div class="analytics-container">

  <header class="analytics-header">
    <button class="back-btn" (click)="goBack()">← {{ 'COMMON.BACK' | translate }}</button>
    <h1>{{ 'ANALYTICS.TITLE' | translate }}</h1>
  </header>

  <main class="analytics-main">

    <div class="loading" *ngIf="isLoading">{{ 'ANALYTICS.LOADING' | translate }}</div>

    <div class="error-message" *ngIf="errorMessage">{{ errorMessage | translate }}</div>

    <app-spending-chart
      *ngIf="!isLoading && transactions.length > 0"
      [transactions]="transactions">
    </app-spending-chart>

    <div class="empty-state" *ngIf="!isLoading && transactions.length === 0 && !errorMessage">
      {{ 'ANALYTICS.NO_DATA' | translate }}
    </div>

  </main>
</div>
