<div class="login-container">
  <div class="login-card">

    <div class="login-header">
       <img src="/uzaybank-logo-badge.svg" alt="UzayBank" class="logo" />
      <h1>UzayBank</h1>
      <p>{{ 'AUTH.REGISTER_SUBTITLE' | translate }}</p>
    </div>

    <form (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="fullName">{{ 'AUTH.FULL_NAME' | translate }}</label>
        <input
          id="fullName"
          type="text"
          [(ngModel)]="registerData.fullName"
          name="fullName"
          [placeholder]="'AUTH.FULL_NAME_PLACEHOLDER' | translate"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">{{ 'AUTH.EMAIL' | translate }}</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="registerData.email"
          name="email"
          [placeholder]="'AUTH.EMAIL_PLACEHOLDER' | translate"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">{{ 'AUTH.PASSWORD' | translate }}</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="registerData.password"
          name="password"
          [placeholder]="'AUTH.PASSWORD_STRONG_PLACEHOLDER' | translate"
          required
        />
        <div class="password-strength" *ngIf="registerData.password">
          <div class="strength-bar">
            <div
              class="strength-fill"
              [ngClass]="getStrengthClass()"
              [style.width.%]="getPasswordStrength() * 20"
            ></div>
          </div>
          <span class="strength-label" [ngClass]="getStrengthClass()">
            {{ getStrengthLabel() | translate }}
          </span>
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage | translate }}
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ (isLoading ? 'AUTH.REGISTERING' : 'AUTH.REGISTER') | translate }}
      </button>

      <p class="switch-link">
        {{ 'AUTH.HAVE_ACCOUNT' | translate }}
        <a routerLink="/login">{{ 'AUTH.GO_LOGIN' | translate }}</a>
      </p>

    </form>

  </div>
</div>
