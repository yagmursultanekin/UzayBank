<div class="login-container">
  <div class="login-card">

     <app-language-switcher></app-language-switcher>
     
    <div class="login-header">
      <h1>UzayBank</h1>
      <p>{{ 'AUTH.LOGIN_SUBTITLE' | translate }}</p>
    </div>

    <!-- successMessage bir çeviri ANAHTARI tutuyor (ör. 'AUTH.SESSION_EXPIRED'),
         hazır metin değil — bu yüzden pipe'tan geçiriliyor. -->
    <div [ngClass]="messageType === 'warning' ? 'warning-message' : 'success-message'" *ngIf="successMessage">
      {{ successMessage | translate }}
    </div>

    <form (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="email">{{ 'AUTH.EMAIL' | translate }}</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="loginData.email"
          name="email"
          [placeholder]="'AUTH.EMAIL_PLACEHOLDER' | translate"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">{{ 'AUTH.PASSWORD' | translate }}</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="loginData.password"
          name="password"
          [placeholder]="'AUTH.PASSWORD_PLACEHOLDER' | translate"
          required
        />
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage | translate }}
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ (isLoading ? 'AUTH.LOGGING_IN' : 'AUTH.LOGIN') | translate }}
      </button>

      <p class="switch-link">
        {{ 'AUTH.NO_ACCOUNT' | translate }}
        <a routerLink="/register">{{ 'AUTH.GO_REGISTER' | translate }}</a>
      </p>

    </form>

  </div>
</div>
